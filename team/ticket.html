<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Details - Team Portal - Scottship Solutions</title>
    <link rel="stylesheet" href="../shared/css/common.css">
    <link rel="stylesheet" href="css/team.css">
</head>
<body>
    <div class="team-layout">
        <aside class="team-sidebar">
            <div class="sidebar-header">
                <a href="dashboard.html" class="sidebar-logo">Scottship Solutions</a>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">Main</div>
                    <a href="dashboard.html" class="nav-item">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                        Dashboard
                    </a>
                    <a href="tickets.html" class="nav-item active">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
                        All Tickets
                    </a>
                </div>
                <div class="nav-section">
                    <div class="nav-section-title">Management</div>
                    <a href="customers.html" class="nav-item">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg>
                        Customers
                    </a>
                    <a href="reports.html" class="nav-item">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                        Reports
                    </a>
                    <a href="settings.html" class="nav-item">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle></svg>
                        Settings
                    </a>
                </div>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar" id="sidebarAvatar">--</div>
                    <div class="user-details">
                        <div class="user-name" id="sidebarName">Loading...</div>
                        <div class="user-role" id="sidebarRole">Team Member</div>
                    </div>
                </div>
                <button class="btn btn-secondary btn-sm mt-md" style="width: 100%;" onclick="logout()">Sign Out</button>
            </div>
        </aside>

        <main class="team-main">
            <header class="team-header">
                <div class="team-header-left">
                    <a href="tickets.html" class="btn btn-secondary btn-sm">← Back to Tickets</a>
                </div>
            </header>

            <div class="team-content" id="ticketContent">
                <div class="empty-state">
                    <div class="spinner"></div>
                    <p>Loading ticket...</p>
                </div>
            </div>
        </main>
    </div>

    <script src="../shared/js/api.js"></script>
    <script>
        const session = requireAuth('team');
        if (session) {
            document.getElementById('sidebarName').textContent = session.user.name;
            document.getElementById('sidebarAvatar').textContent = getInitials(session.user.name);
            document.getElementById('sidebarRole').textContent = session.user.role === 'admin' ? 'Administrator' : 'Technician';
            loadTicket();
        }

        let currentTicket = null;
        let teamUsers = [];

        function getTicketId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        async function loadTicket() {
            const ticketId = getTicketId();
            if (!ticketId) {
                window.location.href = 'tickets.html';
                return;
            }

            try {
                const [ticketRes, usersRes] = await Promise.all([
                    api.getTicket(ticketId),
                    api.getUsers()
                ]);

                if (ticketRes.success) {
                    currentTicket = ticketRes.data;
                    if (usersRes.success) {
                        teamUsers = usersRes.data;
                    }
                    renderTicket();
                } else {
                    document.getElementById('ticketContent').innerHTML = `
                        <div class="empty-state">
                            <h3>Ticket not found</h3>
                            <a href="tickets.html" class="btn btn-primary mt-lg">Back to Tickets</a>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error loading ticket:', error);
            }
        }

        function renderTicket() {
            const t = currentTicket;
            const container = document.getElementById('ticketContent');

            container.innerHTML = `
                <div class="ticket-detail-grid">
                    <div class="ticket-detail-main">
                        <div class="detail-card">
                            <div class="detail-card-header" style="display: flex; justify-content: space-between; align-items: center;">
                                <div>
                                    <span style="color: var(--primary-blue); font-weight: 600;">${t.ticket_number}</span>
                                    <span class="badge ${getStatusClass(t.status)} ml-sm">${getStatusLabel(t.status)}</span>
                                </div>
                                <div class="quick-actions">
                                    <select class="filter-select" id="statusSelect" onchange="updateStatus()">
                                        <option value="open" ${t.status === 'open' ? 'selected' : ''}>Open</option>
                                        <option value="in_progress" ${t.status === 'in_progress' ? 'selected' : ''}>In Progress</option>
                                        <option value="waiting_on_customer" ${t.status === 'waiting_on_customer' ? 'selected' : ''}>Waiting on Customer</option>
                                        <option value="resolved" ${t.status === 'resolved' ? 'selected' : ''}>Resolved</option>
                                        <option value="closed" ${t.status === 'closed' ? 'selected' : ''}>Closed</option>
                                    </select>
                                </div>
                            </div>
                            <div class="detail-card-body">
                                <h2 style="margin-bottom: var(--spacing-md);">${escapeHtml(t.subject)}</h2>
                                <p class="text-muted">${escapeHtml(t.description)}</p>
                            </div>
                        </div>

                        <div class="detail-card">
                            <div class="detail-card-header">Conversation</div>
                            <div id="repliesContainer">
                                ${t.replies.map(r => `
                                    <div class="message ${r.is_internal ? 'internal' : ''}">
                                        <div class="message-header">
                                            <div class="message-author">
                                                <div class="message-avatar ${r.author_type}">${getInitials(r.author_name)}</div>
                                                <div>
                                                    <div class="message-name">
                                                        ${escapeHtml(r.author_name)}
                                                        ${r.is_internal ? '<span class="internal-badge">Internal Note</span>' : ''}
                                                    </div>
                                                    <div class="message-role">${r.author_type === 'customer' ? 'Customer' : 'Support Team'}</div>
                                                </div>
                                            </div>
                                            <div class="message-time">${formatDateTime(r.created_at)}</div>
                                        </div>
                                        <div class="message-content">${escapeHtml(r.content)}</div>
                                    </div>
                                `).join('')}
                            </div>

                            <div class="reply-form">
                                <form id="replyForm">
                                    <textarea id="replyContent" class="form-textarea" rows="4" placeholder="Type your reply..."></textarea>
                                    <div class="reply-form-actions" style="display: flex; justify-content: space-between; align-items: center;">
                                        <label class="checkbox-label">
                                            <input type="checkbox" id="isInternal">
                                            <span>Internal note (not visible to customer)</span>
                                        </label>
                                        <button type="submit" class="btn btn-primary">Send Reply</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>

                    <div class="ticket-detail-sidebar">
                        <div class="detail-card">
                            <div class="detail-card-header">Details</div>
                            <div class="detail-card-body">
                                <div class="detail-row">
                                    <span class="detail-label">Priority</span>
                                    <select class="filter-select" id="prioritySelect" onchange="updatePriority()" style="width: auto;">
                                        <option value="low" ${t.priority === 'low' ? 'selected' : ''}>Low</option>
                                        <option value="medium" ${t.priority === 'medium' ? 'selected' : ''}>Medium</option>
                                        <option value="high" ${t.priority === 'high' ? 'selected' : ''}>High</option>
                                        <option value="critical" ${t.priority === 'critical' ? 'selected' : ''}>Critical</option>
                                    </select>
                                </div>
                                <div class="detail-row">
                                    <span class="detail-label">Assigned To</span>
                                    <select class="filter-select" id="assigneeSelect" onchange="updateAssignee()" style="width: auto;">
                                        <option value="">Unassigned</option>
                                        ${teamUsers.map(u => `<option value="${u.id}" ${t.assigned_to === u.id ? 'selected' : ''}>${u.name}</option>`).join('')}
                                    </select>
                                </div>
                                <div class="detail-row">
                                    <span class="detail-label">Category</span>
                                    <span class="detail-value">${t.category_name || 'General'}</span>
                                </div>
                                <div class="detail-row">
                                    <span class="detail-label">Source</span>
                                    <span class="detail-value">${t.source === 'email' ? 'Email' : 'Web Portal'}</span>
                                </div>
                                <div class="detail-row">
                                    <span class="detail-label">Created</span>
                                    <span class="detail-value">${formatDateTime(t.created_at)}</span>
                                </div>
                                <div class="detail-row">
                                    <span class="detail-label">Updated</span>
                                    <span class="detail-value">${formatDateTime(t.updated_at)}</span>
                                </div>
                            </div>
                        </div>

                        <div class="detail-card">
                            <div class="detail-card-header">Customer</div>
                            <div class="detail-card-body">
                                <div style="display: flex; align-items: center; gap: var(--spacing-sm); margin-bottom: var(--spacing-md);">
                                    <div class="customer-avatar">${getInitials(t.customer_name)}</div>
                                    <div>
                                        <div style="font-weight: 600;">${escapeHtml(t.customer_name)}</div>
                                        <div class="text-sm text-muted">${t.customer_email || ''}</div>
                                    </div>
                                </div>
                                <a href="customer.html?id=${t.customer_id}" class="btn btn-secondary btn-sm" style="width: 100%;">View Customer</a>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // Add reply form handler
            document.getElementById('replyForm').addEventListener('submit', handleReply);
        }

        async function handleReply(e) {
            e.preventDefault();
            const content = document.getElementById('replyContent').value.trim();
            const isInternal = document.getElementById('isInternal').checked;

            if (!content) return;

            try {
                const response = await api.addReply(currentTicket.id, content, isInternal);
                if (response.success) {
                    document.getElementById('replyContent').value = '';
                    document.getElementById('isInternal').checked = false;
                    loadTicket(); // Reload to show new reply
                }
            } catch (error) {
                alert('Error sending reply');
            }
        }

        async function updateStatus() {
            const status = document.getElementById('statusSelect').value;
            try {
                await api.updateTicket(currentTicket.id, { status });
                currentTicket.status = status;
            } catch (error) {
                alert('Error updating status');
            }
        }

        async function updatePriority() {
            const priority = document.getElementById('prioritySelect').value;
            try {
                await api.updateTicket(currentTicket.id, { priority });
                currentTicket.priority = priority;
            } catch (error) {
                alert('Error updating priority');
            }
        }

        async function updateAssignee() {
            const assigned_to = document.getElementById('assigneeSelect').value;
            try {
                await api.updateTicket(currentTicket.id, { assigned_to: assigned_to ? parseInt(assigned_to) : null });
                currentTicket.assigned_to = assigned_to ? parseInt(assigned_to) : null;
            } catch (error) {
                alert('Error updating assignee');
            }
        }

        function logout() {
            api.clearSession();
            window.location.href = 'login.html';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
