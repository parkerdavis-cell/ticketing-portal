<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Scottship Solutions Support</title>
    <link rel="stylesheet" href="../shared/css/common.css">
    <link rel="stylesheet" href="css/customer.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="../index.html" class="auth-logo">Scottship Solutions</a>
                <h1>Reset Password</h1>
                <p class="text-muted">Enter your email address and we'll send you a link to reset your password.</p>
            </div>

            <form id="resetForm" class="auth-form">
                <div id="alertContainer"></div>

                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" id="email" name="email" class="form-input" required autocomplete="email" placeholder="you@company.com">
                </div>

                <button type="submit" class="btn btn-primary btn-lg" id="submitBtn">
                    <span class="btn-text">Send Reset Link</span>
                    <span class="btn-loading hidden"><span class="spinner"></span></span>
                </button>
            </form>

            <div class="auth-footer">
                <p class="text-sm">
                    <a href="login.html">← Back to Sign In</a>
                </p>
            </div>
        </div>
    </div>

    <script src="../shared/js/api.js"></script>
    <script>
        document.getElementById('resetForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const alertContainer = document.getElementById('alertContainer');
            const email = document.getElementById('email').value;

            submitBtn.disabled = true;
            submitBtn.querySelector('.btn-text').classList.add('hidden');
            submitBtn.querySelector('.btn-loading').classList.remove('hidden');
            alertContainer.innerHTML = '';

            try {
                // Simulate API call
                await new Promise(resolve => setTimeout(resolve, 1000));

                alertContainer.innerHTML = `
                    <div class="alert alert-success">
                        If an account exists with this email, you will receive a password reset link shortly.
                    </div>
                `;
                document.getElementById('email').value = '';
            } catch (error) {
                alertContainer.innerHTML = `
                    <div class="alert alert-error">
                        Unable to process request. Please try again.
                    </div>
                `;
            } finally {
                submitBtn.disabled = false;
                submitBtn.querySelector('.btn-text').classList.remove('hidden');
                submitBtn.querySelector('.btn-loading').classList.add('hidden');
            }
        });
    </script>
</body>
</html>
